<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch & Move</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="status-text">Klik op start</div>
        <button onclick="init()">Start</button>


        <div id="start-screen">
            <h1>Catch & Move</h1>

            <p class="instruction">
                Ga in het midden staan<br>
                om het spel te starten
            </p>

            <p class="sub-instruction">
                Beweeg daarna links en rechts om het vallend fruit te vangen
            </p>
        </div>
        <div id="hud">
            <div id="score">Score: 0</div>
            <div id="timer">30</div>
        </div>

        <div id="game-area">
            <div id="fruit-container"></div>
            <div id="player">
                <img src="Mand met transparante achtergrond.png" alt="Mand">
            </div>
        </div>
    </div>
    <div id="gameover-screen" style="display:none;">
        <h2>Game Over</h2>

        <p id="final-score">Jouw score: 0</p>

        <h3>Highscores</h3>
        <ol id="highscore-list"></ol>

        <p id="restart-countdown">
            Nieuwe ronde start automatisch over 15 seconden
        </p>
    </div>


    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <!-- ✅ LIBRARIES (CORRECT) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <!-- ✅ GAME SCRIPT -->
    <!-- ✅ GAME SCRIPT -->
    <script>
        /* =========================
           CONFIG
        ========================= */
        const URL = "./model/";
        const CONFIDENCE_THRESHOLD = 0.5;

        /* =========================
           TEACHABLE MACHINE
        ========================= */
        let model, webcam, labelContainer, maxPredictions;

        /* =========================
           GAME STATE
        ========================= */
        let gameState = "idle";
        let timeLeft = 30;
        let gameTimer = null;
        let middleCounter = 0;
        let wasOutOfView = false;


        let restartCountdown = 15;
        let restartInterval = null;


        /* =========================
           GAME OBJECTS
        ========================= */
        let fruits = [];
        let fruitInterval = null;
        let score = 0;

        const fruitImages = [
            "images/meloen.png",
            "images/banana.png",
            "images/Druiven.png",
            "images/kiwigreen.png",
            "images/appel.png",
            "images/sinaasappel.png",
            "images/mangoeemoji.png",
            "images/blauwbes.png",
            "images/framboos.png",
            "images/peer.png"
        ];

        const player = document.getElementById("player");

        const PLAYER_POSITIONS = {
            left: 80,
            middle: 260,
            right: 440
        };

        /* =========================
           INIT
        ========================= */
        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(200, 200, true);
            await webcam.setup();
            await webcam.play();
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            setStatus("Ga in het midden staan om te starten");
            window.requestAnimationFrame(loop);
        }

        /* =========================
           LOOP
        ========================= */
        async function loop() {
            webcam.update();
            await predict();

            if (gameState === "playing") {
                updateFruits();
            }

            window.requestAnimationFrame(loop);
        }

        /* =========================
           PREDICT
        ========================= */
        async function predict() {
            const predictions = await model.predict(webcam.canvas);

            predictions.forEach((p, i) => {
                labelContainer.childNodes[i].innerText =
                    p.className + ": " + p.probability.toFixed(2);
            });

            const highest = predictions.reduce((max, p) =>
                p.probability > max.probability ? p : max
            );

            handleGameFlow(highest.className.toLowerCase(), highest.probability);
        }

        /* =========================
           GAME FLOW
        ========================= */
        function handleGameFlow(label, confidence) {

            // PLAYER MOVEMENT
            if (gameState === "playing" && PLAYER_POSITIONS[label] !== undefined) {
                player.style.transform = `translateX(${PLAYER_POSITIONS[label]}px)`;
            }

            // START
            if (gameState === "idle") {
                if (label === "middle" && confidence >= CONFIDENCE_THRESHOLD) {
                    middleCounter++;
                } else {
                    middleCounter = 0;
                }

                if (middleCounter > 15) {
                    middleCounter = 0;
                    startGame();
                }
            }

            // RESTART
            if (gameState === "gameover") {
                if (confidence < CONFIDENCE_THRESHOLD) {
                    wasOutOfView = true;
                }

                if (wasOutOfView && label === "middle" && confidence >= CONFIDENCE_THRESHOLD) {
                    resetToIdle();
                }
            }
        }

        /* =========================
           GAME STATES
        ========================= */
        function startGame() {
            gameState = "playing";
            wasOutOfView = false;

            // ✅ STARTSCHERM VERBERGEN
            document.getElementById("start-screen").style.display = "none";

            // ✅ GAME SCHERM TONEN
            document.getElementById("game-area").style.display = "block";
            document.getElementById("hud").style.display = "flex";

            // Mand netjes centreren
            player.style.transform = `translateX(${PLAYER_POSITIONS.middle}px)`;

            score = 0;
            timeLeft = 30;
            updateScoreUI();
            document.getElementById("timer").innerText = timeLeft;

            setStatus(""); // statustekst niet nodig tijdens spelen
            startTimer();

            fruitInterval = setInterval(spawnFruit, 1000);
        }


        function endGame() {
            clearInterval(gameTimer);
            clearInterval(fruitInterval);

            // Fruit opruimen
            fruits.forEach(f => f.element.remove());
            fruits = [];

            gameState = "gameover";

            // ✅ HIGH SCORE OPSLAAN
            saveHighscore(score);

            // ✅ GAME AREA VERBERGEN
            document.getElementById("game-area").style.display = "none";
            document.getElementById("hud").style.display = "none";

            // ✅ GAME OVER SCHERM TONEN
            const gameOverScreen = document.getElementById("gameover-screen");
            gameOverScreen.style.display = "block";

            // ✅ SCORE TONEN
            document.getElementById("final-score").innerText =
                "Jouw score: " + score;

            // ✅ HIGHSCORES TONEN
            renderHighscores();
            saveHighscore(score);

            // ✅ COUNTDOWN STARTEN
            startRestartCountdown();
        }
        function resetToIdle() {
            gameState = "idle";
            wasOutOfView = false;

            clearInterval(restartInterval);

            // ✅ GAME OVER VERBERGEN
            document.getElementById("gameover-screen").style.display = "none";

            // ✅ GAME VERBERGEN
            document.getElementById("game-area").style.display = "none";
            document.getElementById("hud").style.display = "none";

            // ✅ STARTSCHERM TERUG TONEN
            document.getElementById("start-screen").style.display = "flex";

            score = 0;
            timeLeft = 30;
            document.getElementById("timer").innerText = timeLeft;
            updateScoreUI();

            setStatus("");
        }

        /* =========================
           TIMER
        ========================= */
        function startTimer() {
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        /* =========================
           FRUIT
        ========================= */
        function spawnFruit() {
            const fruit = document.createElement("img");
            fruit.classList.add("fruit");

            fruit.src = fruitImages[Math.floor(Math.random() * fruitImages.length)];
            fruit.style.left = Math.random() * 560 + "px";
            fruit.style.top = "0px";

            document.getElementById("fruit-container").appendChild(fruit);

            fruits.push({ element: fruit, y: 0 });
        }

        function updateFruits() {
            const playerRect = player.getBoundingClientRect();

            fruits = fruits.filter(f => {
                f.y += 2;
                f.element.style.top = f.y + "px";

                const fruitRect = f.element.getBoundingClientRect();
                const caught =
                    fruitRect.bottom >= playerRect.top &&
                    fruitRect.left < playerRect.right &&
                    fruitRect.right > playerRect.left;

                if (caught) {
                    f.element.remove();
                    score++;
                    updateScoreUI();
                    return false;
                }

                if (f.y > 400) {
                    f.element.remove();
                    return false;
                }

                return true;
            });
        }

        /* =========================
           UI
        ========================= */
        function updateScoreUI() {
            document.getElementById("score").innerText = "Score: " + score;
        }

        function setStatus(text) {
            document.getElementById("status-text").innerText = text;
        }


        function saveHighscore(newScore) {
            const scores = JSON.parse(localStorage.getItem("highscores")) || [];

            const playerName = generatePlayerName();

            scores.push({
                player: playerName,
                score: newScore
            });

            scores.sort((a, b) => b.score - a.score); // hoogste eerst
            scores.splice(5); // top 5 bewaren

            localStorage.setItem("highscores", JSON.stringify(scores));
        }

        function renderHighscores() {
            const scores = JSON.parse(localStorage.getItem("highscores")) || [];
            const list = document.getElementById("highscore-list");
            list.innerHTML = "";

            scores.forEach(item => {
                // ✅ Skip oude of corrupte data
                if (!item.player || item.score === undefined) return;

                const li = document.createElement("li");
                li.innerText = item.player + ": " + item.score;
                list.appendChild(li);
            });
        }


        function startRestartCountdown() {
            restartCountdown = 15;
            updateRestartCountdownText();

            restartInterval = setInterval(() => {
                restartCountdown--;
                updateRestartCountdownText();

                if (restartCountdown <= 0) {
                    clearInterval(restartInterval);
                    resetToIdle();
                }
            }, 1000);
        }

        function updateRestartCountdownText() {
            document.getElementById("restart-countdown").innerText =
                "Nieuwe ronde start automatisch over " + restartCountdown + " seconden";
        }

        function generatePlayerName() {
            const randomNumber = Math.floor(Math.random() * 100) + 1;
            return "Player " + randomNumber;
        }


    </script>

</body>

</html>
